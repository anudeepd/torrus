<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Rounded square background -->
  <rect x="6" y="6" width="188" height="188" rx="36" fill="#ecfdf5"/>

  <!-- Torus rings (donut front-view) -->
  <circle cx="100" cy="100" r="68" fill="none" stroke="#16a34a" stroke-width="4.5"/>
  <circle cx="100" cy="100" r="48" fill="none" stroke="#0d9488" stroke-width="4"/>
  <circle cx="100" cy="100" r="28" fill="none" stroke="#10b981" stroke-width="3.5"/>

  <!-- Prompt chevron ">" inside the torus hole -->
  <polyline fill="none" stroke="#0d9488" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"
    points="84,90 100,100 84,110"/>

  <!-- Cursor block -->
  <rect x="105" y="93" width="11" height="14" rx="2" fill="#10b981"/>
</svg>
